<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scripts do Coiso</title>
  <link rel="icon" type="image/png" href="imagens/https://github.com/user-attachments/assets/70800093-fbb7-4fe3-b0b6-ec9c6c8c8500">
<style>
  :root{
    --bg: #0f0a1a;
    --bg-soft: #17101f;
    --card: #1c1426;
    --card-hover: #2a1c3a;
    --purple: #9d4edd;
    --purple-deep: #5a189a;
    --purple-glow: rgba(157, 78, 221, 0.35);
    --text: #f1ecf7;
    --text-dim: #9b8fae;
    --border: #2e2240;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  html{ scroll-behavior: smooth; }

  body{
    background: var(--bg);
    background-image:
      radial-gradient(circle at 15% 10%, var(--purple-glow), transparent 35%),
      radial-gradient(circle at 85% 90%, rgba(90,24,154,0.25), transparent 40%);
    background-size: 200% 200%;
    animation: bgShift 18s ease-in-out infinite;
    color: var(--text);
    font-family: 'Inter', -apple-system, 'Segoe UI', Roboto, sans-serif;
    min-height: 100vh;
    padding: 48px 24px 64px;
  }

  @keyframes bgShift{
    0%{ background-position: 0% 0%, 100% 100%; }
    50%{ background-position: 40% 30%, 60% 70%; }
    100%{ background-position: 0% 0%, 100% 100%; }
  }

  @media (prefers-reduced-motion: reduce){
    body{ animation: none; }
  }

  header{
    max-width: 1000px;
    margin: 0 auto 48px;
    text-align: center;
  }

  .eyebrow{
    display:inline-block;
    font-size: 0.75rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--purple);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 6px 16px;
    margin-bottom: 18px;
    background: rgba(157,78,221,0.08);
  }

  h1{
    font-size: clamp(1.8rem, 5vw, 2.6rem);
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 10px;
  }

  h1 span{ color: var(--purple); }

  header p{
    color: var(--text-dim);
    font-size: 1rem;
    max-width: 480px;
    margin: 0 auto;
  }

  main{
    max-width: 1000px;
    margin: 0 auto;
  }

  .grid{
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 20px;
  }

  .card{
    position: relative;
    display: flex;
    flex-direction: column;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    text-decoration: none;
    color: var(--text);
    transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
  }

  .card:hover, .card:focus-visible{
    transform: translateY(-4px);
    border-color: var(--purple);
    background: var(--card-hover);
    box-shadow: 0 12px 28px -10px var(--purple-glow);
  }

  .card:focus-visible{
    outline: 2px solid var(--purple);
    outline-offset: 2px;
  }

  .card-media{
    width: 100%;
    aspect-ratio: 16/10;
    overflow: hidden;
    background: var(--bg-soft);
  }

  .card-media img{
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.3s ease;
  }

  .card:hover .card-media img{
    transform: scale(1.05);
  }

  .card-body{
    padding: 16px 18px 18px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex: 1;
  }

  .card-title{
    font-size: 1rem;
    font-weight: 600;
    line-height: 1.3;
  }

  .card-desc{
    font-size: 0.85rem;
    color: var(--text-dim);
    line-height: 1.4;
  }

  .card-accent{
    height: 3px;
    width: 100%;
    background: linear-gradient(90deg, var(--purple-deep), var(--purple));
    opacity: 0.4;
    transition: opacity 0.18s ease;
  }

  .card:hover .card-accent{
    opacity: 1;
  }

  footer{
    text-align: center;
    margin-top: 56px;
    color: var(--text-dim);
    font-size: 0.8rem;
    transition: color 0.25s ease;
    cursor: default;
  }

  footer:hover{
    color: #c77dff;
  }

  @media (prefers-reduced-motion: reduce){
    .card, .card-media img{ transition: none; }
  }
</style>
</head>
<body>

  <header>
    <span class="eyebrow">Acesso rápido</span>
    <h1>Scripts <span>Coiso</span></h1>
    <p>Seja Bem-vindo(a), clique na imagem abaixo e entre no Script.</p>
  </header>

  <main>
    <div class="grid" id="cardGrid"></div>
  </main>

  <footer>
    Scripts By -Coiso Coisudo de Souza.
  </footer>

<script>
  // ===========================================

      link: "https://taskitos.cupiditys.lol/"

    {

      link: "#"
    }
  ];

  const grid = document.getElementById('cardGrid');

  links.forEach(item => {
    const a = document.createElement('a');
    a.className = 'card';
    a.href = item.link;
    a.target = "_blank";
    a.rel = "noopener noreferrer";

    a.innerHTML = `
      <div class="card-media">
        <img src="${item.imagem}" alt="${item.titulo}" loading="lazy">
      </div>
      <div class="card-body">
        <div class="card-title">${item.titulo}</div>
        <div class="card-desc">${item.descricao}</div>
      </div>
      <div class="card-accent"></div>
    `;

    grid.appendChild(a);
  });
</script>

</body>
</html>
